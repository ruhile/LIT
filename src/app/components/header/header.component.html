<!-- Announcement Bar -->
<div class="announcement-bar">
  <div class="announcement-text">
    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="truck-icon"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
    FREE SHIPPING ON ORDERS ABOVE ₹1499
  </div>
</div>

<!-- Main Sticky Header -->
<header class="main-header">
  <div class="header-container">
    <!-- Mobile Hamburger Menu Toggle -->
    <button class="hamburger-btn" (click)="toggleMobileMenu()" aria-label="Toggle Navigation">
      <span class="hamburger-line" [class.open]="isMobileMenuOpen"></span>
      <span class="hamburger-line" [class.open]="isMobileMenuOpen"></span>
      <span class="hamburger-line" [class.open]="isMobileMenuOpen"></span>
    </button>

    <!-- Desktop Navigation Links -->
    <nav class="desktop-nav">
      <a routerLink="/men" class="nav-link">MEN</a>
      <a routerLink="/women" class="nav-link">WOMEN</a>
      <a routerLink="/products" [queryParams]="{category: 'oversized'}" class="nav-link">OVERSIZED</a>
      <a routerLink="/products" [queryParams]="{category: 'accessories'}" class="nav-link">ACCESSORIES</a>
      <a routerLink="/products" [queryParams]="{category: 'new-drops'}" class="nav-link highlight">NEW DROPS</a>
    </nav>

    <!-- Logo (Centered) -->
    <div class="logo-area">
      <a routerLink="/" class="logo-link">
        <span class="logo-main">LIT</span>
        <span class="logo-sub">LIVE IN TREND</span>
      </a>
    </div>

    <!-- Header Actions (Search & Icons) -->
    <div class="header-actions">
      <!-- Search Box -->
      <div class="search-box-container">
        <div class="search-input-wrapper" [class.focused]="isSearchFocused">
          <input 
            type="text" 
            placeholder="What are you looking for?" 
            [(ngModel)]="searchQuery"
            (input)="onSearchInput()"
            (focus)="onSearchFocus()"
            (blur)="onSearchBlur()"
            (keyup.enter)="executeSearch()"
            class="search-input"
          />
          <button (click)="executeSearch()" class="search-btn" aria-label="Search">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>
        
        <!-- Search suggestions dropdown -->
        <div class="search-suggestions animate-fade-in" *ngIf="isSearchFocused && searchResults.length > 0">
          <div 
            *ngFor="let product of searchResults" 
            (click)="selectSuggestion(product)" 
            class="suggestion-item"
          >
            <img [src]="product.images[0]" [alt]="product.name" class="suggestion-img" />
            <div class="suggestion-info">
              <span class="suggestion-name">{{product.name}}</span>
              <span class="suggestion-price">₹{{product.price}}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Icon Buttons -->
      <div class="icon-buttons">
        <a routerLink="/wishlist" class="icon-btn" aria-label="Wishlist">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="heart-icon"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          <span class="badge" *ngIf="wishlistCount > 0">{{wishlistCount}}</span>
        </a>
        <a routerLink="/cart" class="icon-btn" aria-label="Shopping Cart">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="cart-icon"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
          <span class="badge" *ngIf="cartCount > 0">{{cartCount}}</span>
        </a>
      </div>
    </div>
  </div>
</header>

<!-- Mobile Navigation Drawer Overlay -->
<div class="mobile-nav-overlay" [class.open]="isMobileMenuOpen" (click)="toggleMobileMenu()"></div>

<!-- Mobile Navigation Drawer -->
<div class="mobile-nav-drawer" [class.open]="isMobileMenuOpen">
  <div class="drawer-header">
    <span class="drawer-title">MENU</span>
    <button class="drawer-close" (click)="toggleMobileMenu()" aria-label="Close menu">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <nav class="mobile-links">
    <a routerLink="/men" (click)="toggleMobileMenu()" class="mobile-link">MEN</a>
    <a routerLink="/women" (click)="toggleMobileMenu()" class="mobile-link">WOMEN</a>
    <a routerLink="/products" [queryParams]="{category: 'oversized'}" (click)="toggleMobileMenu()" class="mobile-link">OVERSIZED</a>
    <a routerLink="/products" [queryParams]="{category: 'accessories'}" (click)="toggleMobileMenu()" class="mobile-link">ACCESSORIES</a>
    <a routerLink="/products" [queryParams]="{category: 'new-drops'}" (click)="toggleMobileMenu()" class="mobile-link mobile-link-highlight">NEW DROPS</a>
    <div class="drawer-divider"></div>
    <a routerLink="/wishlist" (click)="toggleMobileMenu()" class="mobile-link flex-link">
      <span>WISHLIST</span>
      <span class="drawer-badge" *ngIf="wishlistCount > 0">{{wishlistCount}}</span>
    </a>
    <a routerLink="/cart" (click)="toggleMobileMenu()" class="mobile-link flex-link">
      <span>MY CART</span>
      <span class="drawer-badge" *ngIf="cartCount > 0">{{cartCount}}</span>
    </a>
  </nav>
</div>
